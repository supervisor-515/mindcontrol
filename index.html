<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>반증 장부</title>
<meta name="description" content="머리 밖에 두는 정직한 회계 — 믿음의 예측을 잠그고 며칠 뒤 실제 결과와 대조하는 단일 파일 장부 앱.">
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#B65A40">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="반증 장부">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4EFE6; --ink:#2E2A24; --ink-2:#6B6357; --ink-3:#9A9082;
  --clay:#B65A40; --clay-soft:#E7C7BD; --olive:#6E7355; --olive-soft:#D6D8C7;
  --line:#E3DACB; --card:#FBF8F2; --shadow:0 1px 2px rgba(46,42,36,.05),0 6px 20px rgba(46,42,36,.04);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;-webkit-text-size-adjust:100%}
body{
  background-image:radial-gradient(circle at 20% 12%,rgba(182,90,64,.04),transparent 45%),radial-gradient(circle at 85% 78%,rgba(110,115,85,.05),transparent 50%);
  background-attachment:fixed;line-height:1.55;padding:max(env(safe-area-inset-top),8px) 0 80px;
}
.wrap{max-width:600px;margin:0 auto;padding:0 16px}
.serif{font-family:"Fraunces",Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}
textarea{resize:vertical;width:100%}
:focus-visible{outline:2px solid var(--clay);outline-offset:2px;border-radius:6px}

/* header */
header{padding:22px 0 14px;display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
header h1{font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:-.01em;line-height:1}
header .sub{font-size:13px;color:var(--ink-2);margin-top:5px;font-style:italic;font-family:"Fraunces",serif}
.topbtns{display:flex;gap:6px;flex-wrap:wrap}
.ghost{font-size:12.5px;color:var(--ink-2);padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:var(--card);min-height:36px}
.ghost:hover{border-color:var(--ink-3);color:var(--ink)}
.ghost.accent{color:var(--clay);border-color:var(--clay-soft)}

/* scoreboard */
.board{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 18px 16px;margin-bottom:18px}
.board .lead{font-family:"Fraunces",serif;font-size:13px;color:var(--ink-2);letter-spacing:.02em;margin-bottom:14px}
.statrow{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.stat{flex:1;min-width:90px}
.stat .num{font-family:"Fraunces",serif;font-size:26px;font-weight:600;line-height:1}
.stat .num.clay{color:var(--clay)} .stat .num.olive{color:var(--olive)}
.stat .lab{font-size:11.5px;color:var(--ink-3);margin-top:5px;letter-spacing:.01em}
/* calibration signature */
.cal{border-top:1px dashed var(--line);padding-top:14px}
.cal .ct{font-size:11.5px;color:var(--ink-3);margin-bottom:9px}
.calrow{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:12.5px}
.calrow .tag{width:104px;flex:none;color:var(--ink-2)}
.calrow .barwrap{flex:1;height:9px;border-radius:5px;background:#ECE4D5;overflow:hidden}
.calrow .bar{height:100%;border-radius:5px;transition:width .5s ease}
.calrow .bar.belief{background:var(--clay)} .calrow .bar.real{background:var(--olive)}
.calrow .pct{width:42px;flex:none;text-align:right;font-family:"Fraunces",serif;font-weight:500}
.calverdict{font-size:12.5px;color:var(--ink-2);margin-top:11px;line-height:1.5}
.calverdict b{color:var(--ink);font-weight:600}
/* trend sparkline */
.trend{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.trend .ct{font-size:11.5px;color:var(--ink-3);margin-bottom:4px}
.trend .ct span{opacity:.85}
.spark{width:100%;height:36px;display:block;margin:2px 0}
.spark polyline{fill:none;stroke:var(--clay);stroke-width:1.6;vector-effect:non-scaling-stroke;stroke-linejoin:round;stroke-linecap:round}
.spark .area{fill:rgba(182,90,64,.08);stroke:none}
.spark .zero{stroke:var(--olive);stroke-width:1;vector-effect:non-scaling-stroke;stroke-dasharray:3 3;opacity:.7}
.spark .dot{fill:var(--clay)}
.trendnow{font-size:12px;color:var(--ink-2);margin-top:3px}
.trendnow b{font-family:"Fraunces",serif;color:var(--clay)}

/* primary add */
.add{display:block;width:100%;background:var(--clay);color:#fff;font-size:15px;font-weight:600;padding:15px;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:22px;letter-spacing:.01em}
.add:hover{filter:brightness(1.04)}
.add small{display:block;font-weight:400;font-size:12px;opacity:.85;margin-top:3px}

/* toolbar: 검색 + 태그 필터 */
.toolbar{margin-bottom:16px}
.toolbar input[type=search]{width:100%;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:10px 15px;font-size:14px}
.toolbar input[type=search]:focus{outline:none;border-color:var(--clay)}
.tagfilter{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.tagfilter button{font-size:12px;color:var(--ink-2);border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 11px;min-height:32px}
.tagfilter button:hover{border-color:var(--ink-3)}
.tagfilter button[aria-pressed=true]{border-color:var(--clay);background:var(--clay-soft);color:#7a3522}
.tagfilter .tcount{opacity:.6;font-size:11px}

/* groups */
.group{margin-bottom:20px}
.ghd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin:0 2px 9px}
.ghd::after{content:"";flex:1;height:1px;background:var(--line)}
.ghd.alert{color:var(--clay)} .ghd.alert::after{background:var(--clay-soft)}

/* cards */
.card{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 15px;margin-bottom:9px;cursor:pointer;transition:transform .08s ease,border-color .15s}
.card:hover{border-color:var(--ink-3)} .card:active{transform:scale(.995)}
.card .choice{font-size:15px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:.01em}
.b-wait{background:#EFE9DC;color:var(--ink-2)}
.b-need{background:var(--clay);color:#fff}
.b-miss{background:var(--olive-soft);color:#41452f}
.b-part{background:#EDE7D8;color:var(--ink-2)}
.b-hit{background:var(--clay-soft);color:#7a3522}
.card .date{font-size:11.5px;color:var(--ink-3)}
.dot{color:var(--ink-3);font-size:11px}
.rejmark{font-size:11px;color:var(--olive);font-weight:600}
.editmark{font-size:11px;color:var(--ink-3);font-style:italic}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-size:10.5px;color:var(--ink-2);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:2px 8px}

/* empty */
.empty{text-align:center;padding:36px 18px;color:var(--ink-2)}
.empty .big{font-family:"Fraunces",serif;font-size:19px;color:var(--ink);margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.6}

/* form screen */
.screen{padding-top:6px}
.back{font-size:13px;color:var(--ink-2);padding:7px 0;margin-bottom:6px;display:inline-flex;gap:5px;align-items:center;min-height:38px}
.back:hover{color:var(--ink)}
.stitle{font-family:"Fraunces",serif;font-size:23px;font-weight:600;margin-bottom:4px}
.shint{font-size:13px;color:var(--ink-2);margin-bottom:20px;line-height:1.5}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
.field .desc{font-size:12px;color:var(--ink-3);font-weight:400;margin-top:-3px;margin-bottom:7px}
.field input[type=text],.field textarea,.field input[type=date]{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--clay)}
.field textarea{min-height:62px}
.presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.presets button{font-size:12px;color:var(--ink-2);border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:6px 12px;min-height:34px}
.presets button:hover{border-color:var(--clay);color:var(--clay)}
.confwrap{display:flex;align-items:center;gap:12px}
.confwrap input[type=range]{flex:1;accent-color:var(--clay)}
.confval{font-family:"Fraunces",serif;font-weight:600;font-size:18px;width:58px;text-align:right;color:var(--clay)}
.save{width:100%;background:var(--clay);color:#fff;font-weight:600;font-size:15px;padding:14px;border-radius:var(--r);margin-top:6px}
.save:hover{filter:brightness(1.04)} .save:disabled{opacity:.4;cursor:not-allowed}
.save.olive{background:var(--olive)}

/* locked box */
.locked{background:#F0EADD;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:18px;position:relative}
.locked .lk{position:absolute;top:11px;right:12px;font-size:11px;color:var(--ink-3)}
.locked .ll{font-size:11.5px;color:var(--ink-3);margin-bottom:5px}
.locked .lv{font-size:14.5px;line-height:1.5}
.locked .lconf{font-size:12px;color:var(--ink-2);margin-top:8px}
/* edit-locked box */
.lockedit{background:#F0EADD;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:18px}
.lockedit .ll{font-size:12px;color:var(--ink-3);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.lockedit .lv{font-size:14.5px;line-height:1.5}
.lockedit .lconf{font-size:12px;color:var(--ink-2);margin-top:8px}
.lockedit textarea{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 12px;min-height:62px}
.unlockbtn{margin-top:11px;font-size:12.5px;color:var(--olive);border:1px solid var(--olive-soft);background:var(--paper);border-radius:999px;padding:9px 14px;min-height:38px}
.unlockbtn:hover{background:var(--olive-soft);color:#41452f}

/* verdict picker */
.vpick{display:flex;gap:8px}
.vpick button{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:11px 4px;font-size:13px;font-weight:600;color:var(--ink-2);min-height:48px}
.vpick button[aria-pressed=true]{border-color:var(--clay);background:var(--clay-soft);color:#7a3522}
.toggle{display:flex;gap:8px}
.toggle button{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:var(--ink-2);min-height:48px}
.toggle button[aria-pressed=true]{border-color:var(--olive);background:var(--olive-soft);color:#41452f}

/* reclass block */
.reclass{background:#FAF4EA;border:1px dashed var(--clay-soft);border-radius:12px;padding:15px;margin-top:6px}
.reclass .rh{font-size:13px;font-weight:600;margin-bottom:5px}
.reclass .rd{font-size:12px;color:var(--ink-2);margin-bottom:11px;line-height:1.5}
.rejbtn{width:100%;background:var(--olive);color:#fff;font-weight:600;padding:11px;border-radius:10px;margin-top:11px;font-size:14px;min-height:48px}
.rejbtn[aria-pressed=true]{background:#41452f}
.rejbtn[aria-pressed=true]::before{content:"✓ "}

/* detail */
.compare{display:flex;gap:10px;margin-bottom:16px}
.compare .col{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px}
.compare .col.real{background:#F2F1E8}
.compare .ch{font-size:11.5px;color:var(--ink-3);margin-bottom:7px;letter-spacing:.02em}
.compare .cb{font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.dsec{margin-bottom:15px}
.dsec .dl{font-size:12px;color:var(--ink-3);margin-bottom:4px}
.dsec .dv{font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.rejcard{background:#F2F4EA;border:1px solid var(--olive-soft);border-radius:12px;padding:13px;margin-bottom:15px}
.danger{font-size:12.5px;color:var(--ink-3);padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--card);min-height:38px}
.danger:hover{color:var(--clay);border-color:var(--clay-soft)}
.detailbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap}
.note{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:18px;line-height:1.6}
.warn{background:var(--clay-soft);color:#7a3522;font-size:12.5px;padding:10px 13px;border-radius:10px;margin-bottom:14px;line-height:1.5}
.warn.soft{background:#F3ECDD;color:var(--ink-2)}
.warn b{font-weight:600}

/* toast (실행취소) */
#toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);border-radius:999px;padding:11px 8px 11px 18px;display:flex;align-items:center;gap:12px;font-size:13.5px;box-shadow:0 8px 28px rgba(46,42,36,.28);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:50;max-width:calc(100vw - 32px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#toast button{background:var(--paper);color:var(--ink);font-weight:600;font-size:12.5px;border-radius:999px;padding:7px 13px;white-space:nowrap}

/* dark mode */
[data-theme=dark]{
  --paper:#1f1c18; --ink:#ECE5D8; --ink-2:#B4AB9A; --ink-3:#8A8174;
  --clay:#D6855F; --clay-soft:#4b2c22; --olive:#9BA47B; --olive-soft:#343a20;
  --line:#3a342c; --card:#2a261f; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);
}
[data-theme=dark] body{background-image:radial-gradient(circle at 20% 12%,rgba(214,133,95,.06),transparent 45%),radial-gradient(circle at 85% 78%,rgba(155,164,123,.06),transparent 50%)}
[data-theme=dark] .calrow .barwrap{background:#3a342c}
[data-theme=dark] .b-wait,[data-theme=dark] .b-part{background:#3a342c;color:var(--ink-2)}
[data-theme=dark] .b-miss{color:var(--ink)}
[data-theme=dark] .b-hit{color:#e9b9a6}
[data-theme=dark] .locked,[data-theme=dark] .lockedit{background:#26221b}
[data-theme=dark] .reclass{background:#272219}
[data-theme=dark] .compare .col.real{background:#252118}
[data-theme=dark] .rejcard{background:#23271a}
[data-theme=dark] .vpick button[aria-pressed=true]{color:#e9b9a6}
[data-theme=dark] .toggle button[aria-pressed=true]{color:#d4d9b8}
[data-theme=dark] .tagfilter button[aria-pressed=true]{color:#e9b9a6}
[data-theme=dark] .rejbtn[aria-pressed=true]{background:#2c3018}
[data-theme=dark] .warn{color:#e9b9a6}
[data-theme=dark] .warn.soft{background:#2b271f;color:var(--ink-2)}
[data-theme=dark] .spark .area{fill:rgba(214,133,95,.1)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<input type="file" id="importer" accept="application/json" style="display:none">

<script>
"use strict";
const KEY="counter-ledger-v1";
const MKEY="counter-ledger-meta-v1";
let data=load();
let meta=loadMeta();
let state={view:"home",id:null,showArchive:false,q:"",tag:null};
let deferredPrompt=null;   // PWA 설치 프롬프트
let canInstall=false;
let formDirty=false;       // 작성 중 이탈 보호
let editUnlocked=false;    // 수정 화면에서 잠금 필드 해제 여부

function load(){
  try{const raw=localStorage.getItem(KEY);const arr=raw?JSON.parse(raw):[];return Array.isArray(arr)?arr.map(normalizeEntry):[];}
  catch(e){return [];}
}
function loadMeta(){
  try{return JSON.parse(localStorage.getItem(MKEY))||{};}catch(e){return {};}
}
function saveMeta(){try{localStorage.setItem(MKEY,JSON.stringify(meta));}catch(e){}}
let storageBlocked=false;
function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(data));storageBlocked=false;}
  catch(e){storageBlocked=true;}
}
function uid(){return (crypto.randomUUID?crypto.randomUUID():"id-"+Date.now()+"-"+Math.random().toString(36).slice(2));}
function todayStr(){const d=new Date();return ymd(d);}
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function plusDays(n){const d=new Date();d.setDate(d.getDate()+n);return ymd(d);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmtDate(s){if(!s)return "";const[y,m,d]=s.split("-");return `${+m}월 ${+d}일`;}
function edited(e){return e.editLog&&e.editLog.length>0;}
function isYmd(s){return typeof s==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s);}
function clampConf(v){v=Number(v);if(!isFinite(v))v=0;return Math.max(0,Math.min(100,Math.round(v)));}
function parseTags(s){
  return String(s||"").split(",").map(t=>t.trim()).filter(Boolean)
    .map(t=>t.slice(0,40)).filter((t,i,a)=>a.indexOf(t)===i).slice(0,12);
}

/* 가져온/저장된 항목을 안전한 모양으로 정규화 (타입 강제 = XSS·깨짐 방지) */
function normalizeEntry(x){
  if(!x||typeof x!=="object")x={};
  const e={
    id:x.id?String(x.id):uid(),
    createdAt:Number(x.createdAt)||Date.now(),
    choice:String(x.choice==null?"":x.choice),
    reversibleNote:String(x.reversibleNote==null?"":x.reversibleNote),
    prediction:String(x.prediction==null?"":x.prediction),
    predictionConfidence:clampConf(x.predictionConfidence),
    reviewDate:isYmd(x.reviewDate)?x.reviewDate:todayStr(),
    outcome:x.outcome==null?null:String(x.outcome),
    outcomeRecordedAt:x.outcomeRecordedAt?Number(x.outcomeRecordedAt)||null:null,
    verdict:["빗나감","일부","적중"].includes(x.verdict)?x.verdict:null,
    didRevert:x.didRevert==null?null:!!x.didRevert,
    reclassThought:String(x.reclassThought==null?"":x.reclassThought),
    reclassRejected:!!x.reclassRejected,
    reclassRejectionNote:String(x.reclassRejectionNote==null?"":x.reclassRejectionNote),
    tags:Array.isArray(x.tags)?x.tags.map(t=>String(t).slice(0,40)).filter(Boolean).filter((t,i,a)=>a.indexOf(t)===i).slice(0,12):[],
    archived:!!x.archived,
    editLog:Array.isArray(x.editLog)?x.editLog:[]
  };
  if(e.outcome==null){e.verdict=null;e.didRevert=null;}
  return e;
}

function statusOf(e){
  if(e.outcome!=null) return "done";
  if(e.reviewDate && e.reviewDate<=todayStr()) return "need";
  return "wait";
}

function active(){return data.filter(e=>!e.archived);}
function stats(){
  const done=active().filter(e=>e.outcome!=null);
  const n=done.length;
  let miss=0,part=0,hit=0,conf=0,rej=0;
  done.forEach(e=>{
    if(e.verdict==="빗나감")miss++;else if(e.verdict==="일부")part++;else if(e.verdict==="적중")hit++;
    conf+=Number(e.predictionConfidence)||0;
    if(e.reclassRejected)rej++;
  });
  const missRate=n?Math.round(((miss+0.5*part)/n)*100):0;
  const hitRate=n?Math.round(((hit+0.5*part)/n)*100):0;
  const avgConf=n?Math.round(conf/n):0;
  /* 최근 10건 보정 격차 (확신 − 적중) */
  const recent=done.slice().sort((a,b)=>(b.outcomeRecordedAt||0)-(a.outcomeRecordedAt||0)).slice(0,10);
  let rConf=0,rHit=0;
  recent.forEach(e=>{rConf+=Number(e.predictionConfidence)||0;rHit+=(e.verdict==="적중"?1:e.verdict==="일부"?0.5:0)*100;});
  const recentK=recent.length;
  const recentGap=recentK?Math.round(rConf/recentK-rHit/recentK):0;
  return {n,miss,part,hit,missRate,hitRate,avgConf,rej,recentK,recentGap};
}

/* ---------- 테마 ---------- */
function applyTheme(){
  const mode=meta.theme||"auto";
  let dark=mode==="dark";
  if(mode==="auto"){try{dark=matchMedia("(prefers-color-scheme: dark)").matches;}catch(e){dark=false;}}
  document.documentElement.dataset.theme=dark?"dark":"light";
  const tc=document.querySelector('meta[name="theme-color"]');
  if(tc)tc.setAttribute("content",dark?"#1f1c18":"#B65A40");
}
function cycleTheme(){
  const cur=meta.theme||"auto";
  meta.theme={auto:"light",light:"dark",dark:"auto"}[cur];
  saveMeta();applyTheme();render();
}
function themeLabel(){return {auto:"🌗 자동",light:"☀️ 라이트",dark:"🌙 다크"}[meta.theme||"auto"];}

/* ---------- 토스트(실행취소) ---------- */
let toastTimer=null,undoAction=null;
function showToast(msg,undo){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  undoAction=undo||null;
  t.innerHTML=`<span>${esc(msg)}</span>`+(undo?`<button type="button" id="toast-undo">실행취소</button>`:"");
  t.classList.add("show");
  if(undo){
    document.getElementById("toast-undo").onclick=()=>{
      clearTimeout(toastTimer);t.classList.remove("show");
      const f=undoAction;undoAction=null;if(f)f();
    };
  }
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove("show");undoAction=null;},5000);
}

function trendSvg(){
  const done=active().filter(e=>e.outcome!=null).sort((a,b)=>(a.outcomeRecordedAt||0)-(b.outcomeRecordedAt||0));
  if(done.length<2)return "";
  let cConf=0,cHit=0;const pts=[];
  done.forEach((e,i)=>{
    cConf+=Number(e.predictionConfidence)||0;
    cHit+=(e.verdict==="적중"?1:e.verdict==="일부"?0.5:0)*100;
    pts.push(cConf/(i+1)-cHit/(i+1));
  });
  const n=pts.length,W=100,H=34,pad=2;
  const max=Math.max(40,...pts.map(v=>Math.abs(v)));
  const yOf=g=>(H/2-(g/max)*(H/2-pad)).toFixed(1);
  const xOf=i=>((i/(n-1))*W).toFixed(1);
  const line=pts.map((g,i)=>xOf(i)+","+yOf(g)).join(" ");
  const area=`0,${H/2} `+line+` ${W},${H/2}`;
  const last=Math.round(pts[n-1]);
  return `<div class="trend">
    <div class="ct">보정 격차 추세 <span>· 0(올리브 선)에 가까울수록 장부가 믿음을 교정 중</span></div>
    <svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="보정 격차 추세 그래프, 현재 ${last} 퍼센트포인트">
      <polygon class="area" points="${area}"></polygon>
      <line class="zero" x1="0" y1="${H/2}" x2="${W}" y2="${H/2}"></line>
      <polyline points="${line}"></polyline>
      <circle class="dot" cx="${xOf(n-1)}" cy="${yOf(pts[n-1])}" r="1.8" vector-effect="non-scaling-stroke"></circle>
    </svg>
    <div class="trendnow">현재 격차 <b>${last}%p</b> <span style="color:var(--ink-3)">(확신 − 적중)</span></div>
  </div>`;
}

function backupNote(){
  if(data.length===0)return "";
  const last=meta.lastExportAt;
  if(!last)return `<div class="warn soft">아직 한 번도 백업하지 않았다. 기록은 이 기기에만 있다 — <b>내보내기</b>로 지금 백업해라.</div>`;
  const days=Math.floor((Date.now()-last)/86400000);
  if(days>=7)return `<div class="warn soft">마지막 백업 <b>${days}일 전</b>. 새 기록이 쌓였다면 다시 <b>내보내기</b> 해라.</div>`;
  return "";
}

function card(e){
  const st=statusOf(e);
  let badge="";
  if(e.archived)badge=`<span class="badge b-wait">보관됨</span>`;
  else if(st==="need")badge=`<span class="badge b-need">확인 필요</span>`;
  else if(st==="wait")badge=`<span class="badge b-wait">대기 · ${fmtDate(e.reviewDate)} 확인</span>`;
  else{
    const m={"빗나감":["b-miss","빗나감"],"일부":["b-part","일부 맞음"],"적중":["b-hit","적중"]}[e.verdict]||["b-wait","결산"];
    badge=`<span class="badge ${m[0]}">${m[1]}</span>`;
  }
  const searchText=[e.choice,e.prediction,e.outcome,e.reclassThought,(e.tags||[]).join(" ")].join(" ").toLowerCase();
  const tagsHtml=(e.tags&&e.tags.length)?`<div class="tags">${e.tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("")}</div>`:"";
  return `<div class="card" role="button" tabindex="0" data-open="${e.id}" data-search="${esc(searchText)}" aria-label="${esc(e.choice)||"제목 없음"} 자세히 보기">
    <div class="choice">${esc(e.choice)||"(제목 없음)"}</div>
    <div class="meta">${badge}${e.reclassRejected?`<span class="dot">·</span><span class="rejmark">재분류 기각함</span>`:""}${edited(e)?`<span class="dot">·</span><span class="editmark">수정됨</span>`:""}</div>
    ${tagsHtml}
  </div>`;
}

    </div>
    ${isDone?`<div class="field"><label for="e-outcome">실제로 일어난 일</label><textarea id="e-outcome">${esc(e.outcome)}</textarea></div>
    <div class="field"><label id="e-vlabel">예측과 견줘보면</label>
      <div class="vpick" id="e-verdict" role="group" aria-labelledby="e-vlabel">
        <button type="button" data-v="빗나감" aria-pressed="${e.verdict==="빗나감"?"true":"false"}">빗나감</button>
        <button type="button" data-v="일부" aria-pressed="${e.verdict==="일부"?"true":"false"}">일부 맞음</button>
        <button type="button" data-v="적중" aria-pressed="${e.verdict==="적중"?"true":"false"}">적중</button>
      </div>
    </div>
    <div class="note">결산 내용(실제 결과·평결)을 고치면 '(수정됨)'으로 기록된다.</div>`:""}
    ${edited(e)?`<div class="note">이미 ${e.editLog.length}번 수정된 기록이다.</div>`:""}
    <button class="save" data-act="saveedit">수정 저장</button>
  </div>`;
}

function viewDetail(){
  const e=data.find(x=>x.id===state.id);
  if(!e)return viewHome();
  const st=statusOf(e);
  const archBtn=e.archived
    ? `<button class="danger" data-act="unarchive">보관 해제</button>`
    : `<button class="danger" data-act="archive">보관</button>`;
  if(st!=="done"){
    return `<div class="screen"><button class="back" data-act="home">← 장부</button>
      <div class="stitle serif">대기 중인 실험${edited(e)?` <span class="editmark">(수정됨)</span>`:""}</div>
      <div class="locked"><span class="lk">🔒</span><div class="ll">믿음의 예측</div><div class="lv">${esc(e.prediction)}</div><div class="lconf">확신 ${e.predictionConfidence}% · ${fmtDate(e.reviewDate)} 확인 예정</div></div>
      <div class="dsec"><div class="dl">선택</div><div class="dv">${esc(e.choice)}</div></div>
      ${e.reversibleNote?`<div class="dsec"><div class="dl">되돌리는 법</div><div class="dv">${esc(e.reversibleNote)}</div></div>`:""}
      ${(e.tags&&e.tags.length)?`<div class="tags" style="margin-bottom:15px">${e.tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("")}</div>`:""}
      <button class="save" data-act="goreview">${st==="need"?"결과 적기":"미리 결과 적기"}</button>
      <div class="detailbtns"><button class="danger" data-act="edit">수정</button>${archBtn}</div>
    </div>`;
  }
  const vmap={"빗나감":"빗나갔다","일부":"일부만 맞았다","적중":"적중했다"};
  return `<div class="screen">
    <button class="back" data-act="home">← 장부</button>
    <div class="stitle serif">${esc(e.choice)}</div>
    <div class="shint">${vmap[e.verdict]||""} · 확신 ${e.predictionConfidence}%${edited(e)?" · (수정됨)":""}</div>
    <div class="compare">
      <div class="col"><div class="ch">🔒 믿음의 예측</div><div class="cb">${esc(e.prediction)}</div></div>
      <div class="col real"><div class="ch">실제로 일어난 일</div><div class="cb">${esc(e.outcome)}</div></div>
    </div>
    ${e.didRevert?`<div class="dsec"><div class="dl">되돌렸나</div><div class="dv">되돌렸다</div></div>`:`<div class="dsec"><div class="dl">되돌렸나</div><div class="dv">아니오 — 그대로 두고도 괜찮았다</div></div>`}
    ${e.reclassThought?`<div class="rejcard"><div class="dl" style="color:var(--olive);font-weight:600;margin-bottom:6px">${e.reclassRejected?"✓ 기각한 재분류":"포착한 재분류"}</div><div class="dv" style="text-decoration:${e.reclassRejected?"line-through":"none"};opacity:${e.reclassRejected?".7":"1"}">${esc(e.reclassThought)}</div>${e.reclassRejectionNote?`<div class="dv" style="margin-top:8px;color:var(--olive)">→ ${esc(e.reclassRejectionNote)}</div>`:""}</div>`:""}
    ${e.reversibleNote?`<div class="dsec"><div class="dl">되돌리는 법(당시 메모)</div><div class="dv">${esc(e.reversibleNote)}</div></div>`:""}
    ${(e.tags&&e.tags.length)?`<div class="tags" style="margin-bottom:15px">${e.tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("")}</div>`:""}
    <div class="detailbtns">
      <button class="danger" data-act="edit">수정</button>
      ${archBtn}
      <button class="danger" data-act="delete">영구 삭제</button>
    </div>
  </div>`;
}

/* ---------- wiring ---------- */
let draft={verdict:null,revert:"no",rejected:false};
let editDraft={verdict:null};
function openDetail(id){
  if(!leaveGuard())return;
  state.view="detail";state.id=id;render();
}
function leaveGuard(){
  if(["new","review","edit"].includes(state.view)&&formDirty){
    if(!confirm("작성 중인 내용이 사라진다. 나갈까?"))return false;
  }
  formDirty=false;
  return true;
}
function applyFilter(){
  const qEl=document.getElementById("q");
  const q=(qEl?qEl.value:"").trim().toLowerCase();
  if(qEl)state.q=qEl.value;
  let visible=0;
  app.querySelectorAll(".card[data-search]").forEach(c=>{
    const hit=!q||(c.dataset.search||"").includes(q);
    c.style.display=hit?"":"none";if(hit)visible++;
  });
  app.querySelectorAll(".group").forEach(g=>{
    const any=[...g.querySelectorAll(".card")].some(c=>c.style.display!=="none");
    g.style.display=any?"":"none";
  });
  const nr=document.getElementById("noresult");
  if(nr)nr.style.display=visible===0?"":"none";
}
function wire(){
  app.querySelectorAll("[data-open]").forEach(el=>{
    el.onclick=()=>openDetail(el.dataset.open);
    el.onkeydown=(ev)=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();openDetail(el.dataset.open);}};
  });
  app.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>handle(el.dataset.act));

  // 확인일 빠른 프리셋
  app.querySelectorAll(".presets").forEach(p=>{
    const target=p.dataset.target;
    p.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      const el=document.getElementById(target);
      if(el){el.value=plusDays(Number(b.dataset.days));formDirty=true;}
    });
  });

  // 작성 중 이탈 보호
  if(["new","review","edit"].includes(state.view)){
    const scr=app.querySelector(".screen");
    if(scr)scr.addEventListener("input",()=>{formDirty=true;});
  }

  if(state.view==="home"){
    app.querySelectorAll("[data-tag]").forEach(b=>b.onclick=()=>{state.tag=b.dataset.tag||null;render();});
    const q=document.getElementById("q");
    if(q){q.oninput=applyFilter;applyFilter();}
  }
  if(state.view==="new"){
    const r=document.getElementById("f-conf");
    if(r)r.oninput=()=>document.getElementById("conf-val").textContent=r.value+"%";
  }
  if(state.view==="edit"){
    const u=document.getElementById("e-unlock");
    if(u)u.onclick=()=>{
      editUnlocked=true;formDirty=true;
      document.getElementById("e-pred-ro").style.display="none";
      document.getElementById("e-pred-edit").style.display="block";
    };
    const r=document.getElementById("e-conf");
    if(r)r.oninput=()=>document.getElementById("e-conf-val").textContent=r.value+"%";
    const e=data.find(x=>x.id===state.id);
    editDraft={verdict:e?e.verdict:null};
    const vp=document.getElementById("e-verdict");
    if(vp)vp.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      editDraft.verdict=b.dataset.v;formDirty=true;
      vp.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));
    });
  }
  if(state.view==="review"){
    draft={verdict:null,revert:"no",rejected:false};
    const vp=document.getElementById("r-verdict");
    vp.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      draft.verdict=b.dataset.v;formDirty=true;
      vp.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));
      const slot=document.getElementById("reclass-slot");
      if(draft.verdict==="빗나감"||draft.verdict==="일부"){slot.innerHTML=reclassBlock();bindReject();}
      else slot.innerHTML="";
    });
    const rv=document.getElementById("r-revert");
    rv.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      draft.revert=b.dataset.rv;formDirty=true;
      rv.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));
    });
  }
}
function bindReject(){
  const rb=document.getElementById("r-reject");
  if(rb)rb.onclick=()=>{draft.rejected=!draft.rejected;rb.setAttribute("aria-pressed",draft.rejected?"true":"false");rb.textContent=draft.rejected?"이 재분류를 기각했다":"이 재분류를 기각한다";};
}

function handle(act){
  if(act==="home"){if(!leaveGuard())return;state.view="home";state.id=null;render();}
  else if(act==="back-detail"){if(!leaveGuard())return;state.view="detail";render();}
  else if(act==="new"){if(!leaveGuard())return;state.view="new";formDirty=false;render();}
  else if(act==="togglearch"){state.showArchive=!state.showArchive;render();}
  else if(act==="goreview"){state.view="review";formDirty=false;render();}
  else if(act==="edit"){state.view="edit";editUnlocked=false;formDirty=false;render();}
  else if(act==="export")doExport();
  else if(act==="exportcsv")doExportCsv();
  else if(act==="import")document.getElementById("importer").click();
  else if(act==="install")doInstall();
  else if(act==="theme")cycleTheme();
  else if(act==="savenew")saveNew();
  else if(act==="saveoutcome")saveOutcome();
  else if(act==="saveedit")saveEdit();
  else if(act==="archive"){
    const e=data.find(x=>x.id===state.id);
    if(e){const id=e.id;e.archived=true;persist();state.view="home";render();
      showToast("보관함으로 옮겼다.",()=>{const t=data.find(x=>x.id===id);if(t){t.archived=false;persist();render();}});}
  }
  else if(act==="unarchive"){
    const e=data.find(x=>x.id===state.id);
    if(e){e.archived=false;persist();render();}
  }
  else if(act==="delete"){
    if(confirm("이 기록을 영구히 삭제한다. (실행취소는 잠깐만 가능하다) 진행할까?")){
      const idx=data.findIndex(x=>x.id===state.id);
      const removed=idx>=0?data[idx]:null;
      data=data.filter(x=>x.id!==state.id);persist();state.view="home";render();
      if(removed)showToast("기록을 삭제했다.",()=>{data.splice(Math.min(idx,data.length),0,removed);persist();render();});
    }
  }
}

function saveNew(){
  const choice=document.getElementById("f-choice").value.trim();
  const pred=document.getElementById("f-pred").value.trim();
  if(!choice&&!pred){alert("선택이나 예측 중 하나는 적어야 한다.");return;}
  const e={
    id:uid(),createdAt:Date.now(),
    choice,reversibleNote:document.getElementById("f-rev").value.trim(),
    prediction:pred,predictionConfidence:clampConf(document.getElementById("f-conf").value),
    reviewDate:document.getElementById("f-date").value||plusDays(3),
    outcome:null,outcomeRecordedAt:null,verdict:null,didRevert:null,
    reclassThought:"",reclassRejected:false,reclassRejectionNote:"",
    tags:parseTags(document.getElementById("f-tags").value),
    archived:false,editLog:[]
  };
  data.unshift(e);persist();
  formDirty=false;state.view="home";render();
}

function saveEdit(){
  const e=data.find(x=>x.id===state.id);
  if(!e)return;
  e.choice=document.getElementById("e-choice").value.trim();
  e.reversibleNote=document.getElementById("e-rev").value.trim();
  e.tags=parseTags(document.getElementById("e-tags").value);
  const dateEl=document.getElementById("e-date");
  if(dateEl)e.reviewDate=dateEl.value||e.reviewDate;
  if(!Array.isArray(e.editLog))e.editLog=[];
  if(editUnlocked){
    const newPred=document.getElementById("e-pred").value.trim();
    const newConf=clampConf(document.getElementById("e-conf").value);
    if(newPred!==e.prediction){e.editLog.push({field:"prediction",at:Date.now()});e.prediction=newPred;}
    if(newConf!==e.predictionConfidence){e.editLog.push({field:"predictionConfidence",at:Date.now()});e.predictionConfidence=newConf;}
  }
  // 결산 내용 수정 (결과·평결)
  if(e.outcome!=null){
    const oEl=document.getElementById("e-outcome");
    if(oEl){const nv=oEl.value.trim();if(nv&&nv!==e.outcome){e.editLog.push({field:"outcome",at:Date.now()});e.outcome=nv;}}
    if(editDraft.verdict&&editDraft.verdict!==e.verdict){e.editLog.push({field:"verdict",at:Date.now()});e.verdict=editDraft.verdict;}
  }
  persist();
  formDirty=false;state.view="detail";render();
}

function saveOutcome(){
  const e=data.find(x=>x.id===state.id);
  if(!e)return;
  const outcome=document.getElementById("r-outcome").value.trim();
  if(!outcome){alert("실제로 무슨 일이 있었는지 적어야 한다.");return;}
  if(!draft.verdict){alert("예측과 견줘 평결을 골라라.");return;}
  e.outcome=outcome;
  e.outcomeRecordedAt=Date.now();
  e.verdict=draft.verdict;
  e.didRevert=draft.revert==="yes";
  const rc=document.getElementById("r-reclass");
  const why=document.getElementById("r-why");
  e.reclassThought=rc?rc.value.trim():"";
  e.reclassRejected=e.reclassThought?draft.rejected:false;
  e.reclassRejectionNote=e.reclassRejected?(why?why.value.trim():""):"";
  persist();
  formDirty=false;state.view="detail";render();
}

/* ---------- export / import ---------- */
function doExport(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  triggerDownload(blob,`반증장부_${todayStr()}.json`);
  meta.lastExportAt=Date.now();saveMeta();
  if(state.view==="home")render();
}
function csvCell(v){
  if(v==null)v="";
  if(Array.isArray(v))v=v.join("; ");
  v=String(v);
  if(/[",\r\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';
  return v;
}
function doExportCsv(){
  const cols=["id","createdAt","choice","reversibleNote","prediction","predictionConfidence","reviewDate","outcome","outcomeRecordedAt","verdict","didRevert","reclassThought","reclassRejected","reclassRejectionNote","tags","archived"];
  const lines=[cols.join(",")];
  data.forEach(e=>lines.push(cols.map(c=>csvCell(e[c])).join(",")));
  const blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  triggerDownload(blob,`반증장부_${todayStr()}.csv`);
  meta.lastExportAt=Date.now();saveMeta();
  if(state.view==="home")render();
}
function triggerDownload(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
document.getElementById("importer").onchange=function(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      if(!Array.isArray(parsed))throw new Error("형식 오류");
      const incoming=parsed.map(normalizeEntry);
      if(data.length){
        if(!confirm(`가져온 ${incoming.length}건을 현재 ${data.length}건과 합친다.\n(같은 항목은 가져온 내용으로 갱신, 나머지는 그대로 둔다)\n\n계속할까?`)){ev.target.value="";return;}
        const byId=new Map(data.map(e=>[e.id,e]));
        incoming.forEach(e=>byId.set(e.id,e));
        data=Array.from(byId.values());
      }else{
        data=incoming;
      }
      persist();state.view="home";render();
    }catch(err){alert("불러오지 못했다. 올바른 JSON 파일인지 확인해라.");}
    ev.target.value="";
  };
  reader.readAsText(file);
};

/* ---------- PWA: 설치 & 서비스워커 ---------- */
async function doInstall(){
  if(!deferredPrompt){
    alert("이미 설치돼 있거나, 브라우저 메뉴의 '홈 화면에 추가'로 설치할 수 있다.");
    return;
  }
  deferredPrompt.prompt();
  try{await deferredPrompt.userChoice;}catch(e){}
  deferredPrompt=null;canInstall=false;
  if(state.view==="home")render();
}
window.addEventListener("beforeinstallprompt",ev=>{
  ev.preventDefault();
  deferredPrompt=ev;canInstall=true;
  if(state.view==="home")render();
});
window.addEventListener("appinstalled",()=>{
  deferredPrompt=null;canInstall=false;
  if(state.view==="home")render();
});
window.addEventListener("beforeunload",ev=>{
  if(formDirty){ev.preventDefault();ev.returnValue="";}
});
try{
  const mq=matchMedia("(prefers-color-scheme: dark)");
  mq.addEventListener("change",()=>{if((meta.theme||"auto")==="auto")applyTheme();});
}catch(e){}
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}

/* ---------- init ---------- */
applyTheme();
const _params=new URLSearchParams(location.search);
if(_params.get("action")==="new"){state.view="new";try{history.replaceState({},"",location.pathname);}catch(e){}}
render();
</script>
